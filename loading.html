<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>こえむすび</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#eef3ea;font:14px sans-serif;color:#4a6a4a}
#hud{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:100vmin;height:100vmin;background:center/contain no-repeat}
#msg{position:absolute;left:10%;top:34%;width:80%;height:33%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:#5a7a5a}
#msg .t{font-size:5.5vmin;font-weight:700;letter-spacing:.08em}
#msg .s{font-size:2.6vmin;opacity:.7;margin-top:1.6vmin}
.dot{animation:blink 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
</style></head>
<body>
<div id="hud"><div id="msg">
<div class="t">起動中<span class="dot">・</span><span class="dot">・</span><span class="dot">・</span></div>
<div class="s">warming up…</div>
</div></div>
<script>document.getElementById('hud').style.backgroundImage='url(hud1.png)';</script>
</body></html>
